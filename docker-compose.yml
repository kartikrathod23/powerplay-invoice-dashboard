version: "3.9"

services:
  mongodb:
    image: mongo:8
    container_name: invoice-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend

    container_name: invoice-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env

    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend

    container_name: invoice-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongodb_data: